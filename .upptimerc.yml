status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  baseUrl: /ZEFUpptime
  logoUrl: https://images.squarespace-cdn.com/content/v1/5a452989f6576e04a03298a3/1514483288873-9TPKF9RQVZOK59GES9Y7/favicon.ico
  name: ZEFUpptime
  introTitle: "**ZEF Energy Inc** uptime provided by Upptime: the open-source uptime monitor and status page, powered entirely by GitHub."
  introMessage: This status page uses **real-time** data from our [GitHub repository](https://github.com/zefenergydev/ZEFUpptime). No server required — just GitHub Actions, Issues, and Pages. [**Get your own for free**](https://github.com/upptime/upptime)
  navbar:
    - title: Status
      href: /ZEFUpptime/
    - title: GitHub
      href: https://github.com/$OWNER/$REPO/
    - title: Status.io Page
      href: https://zefenergy.status.io/


# Change these first
owner: zefenergydev # Your GitHub organization or username, where this repository lives
repo: ZEFUpptime # The name of this repository

sites:
  - name: ZEF Energy Public Website
    url: https://www.zefenergy.com
  - name: ZEFNET Partner API
    url: https://api.zefenergy.com
  - name: ZEFNET Portal
    url: https://utility.zefenergy.com/
  - name: ZEFNET Factory Portal
    url: https://factory.zefenergy.com/home
  - name: ZEFNET Charge Mobile App
